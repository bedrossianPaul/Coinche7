services:
  db:
    image: mysql:8.4
    container_name: coinche7-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpwd}
      MYSQL_DATABASE: ${DB_NAME:-coinche7}
      MYSQL_USER: ${DB_USER:-coinche7}
      MYSQL_PASSWORD: ${DB_PASSWORD:-coinche7pwd}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpwd}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: coinche7-backend
    restart: unless-stopped
    working_dir: /app
    stdin_open: true
    tty: true
    command: mvn spring-boot:run
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-coinche7}
      DB_USER: ${DB_USER:-coinche7}
      DB_PASSWORD: ${DB_PASSWORD:-coinche7pwd}
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    image: node:20-alpine
    container_name: coinche7-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data:
  maven_cache:
  frontend_node_modules: